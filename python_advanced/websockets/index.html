<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="chat">
        <header class="chat__header">
            <h1>WebSocket Chat</h1>
            <span id="status" class="status status--off">disconnected</span>
        </header>

        <ul id="messages" class="messages"></ul>

        <form id="form" class="composer">
            <input id="input" class="composer__input" type="text"
                   placeholder="Type a message…" autocomplete="off" required>
            <button type="submit" class="composer__send">Send</button>
        </form>
    </main>

    <script src="chat.js"></script>
</body>
</html>
